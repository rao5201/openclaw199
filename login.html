<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 安全联盟 - 后台管理系统</title>
    <link rel="stylesheet" href="assets/css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="logo">🛡️ OpenClaw</div>
                <h1>后台管理系统</h1>
                <p>安全联盟管理平台</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label>用户名</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" class="form-input" placeholder="请输入用户名" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔐</span>
                        <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
                        <button type="button" class="toggle-password" onclick="togglePassword()">👁️</button>
                    </div>
                </div>

                <div class="form-options">
                    <label class="checkbox-label">
                        <input type="checkbox" id="remember">
                        <span>记住密码</span>
                    </label>
                    <a href="#" class="forgot-link">忘记密码？</a>
                </div>

                <button type="submit" class="btn-login">
                    <span class="btn-text">登录</span>
                    <span class="btn-loading" style="display: none;">登录中...</span>
                </button>

                <div class="login-footer">
                    <p>默认账号: admin / admin123</p>
                    <a href="#" class="register-link">注册新账号</a>
                </div>
            </form>
        </div>

        <div class="login-bg">
            <div class="bg-pattern"></div>
        </div>
    </div>

    <script src="assets/js/login.js"></script>
</body>
</html>
