name: Deploy to CloudBase

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  NODE_VERSION: '18.x'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 安装 CloudBase CLI
        run: |
          npm install -g @cloudbase/cli

      - name: 配置 CloudBase
        run: |
          cloudbase login --apiKeyId ${{ secrets.TCB_KEY_ID }} --apiKey ${{ secrets.TCB_KEY }}

      - name: 部署静态网站
        run: |
          cloudbase hosting:deploy . -e ${{ secrets.TCB_ENV_ID }}
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}

      - name: 部署云函数
        run: |
          for dir in cloud-functions/*/; do
            if [ -f "$dir/package.json" ]; then
              cd "$dir"
              cloudbase functions:deploy -e ${{ secrets.TCB_ENV_ID }}
              cd ../..
            fi
          done
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}

      - name: 部署成功通知
        if: success()
        run: |
          echo "✅ 部署成功！"
          echo "🌐 网站地址: https://${{ secrets.TCB_ENV_ID }}.tcb.qcloud.la"
          echo "📊 CloudBase 控制台: https://console.cloud.tencent.com/tcb"

      - name: 部署失败通知
        if: failure()
        run: |
          echo "❌ 部署失败，请检查日志"
